apiVersion: v1
kind: Secret
metadata:
  name: ai-apis-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
  annotations:
    helm.sh/chart: {{ include "ai-apis.chart" . }}
type: Opaque
data:
  # Shared API keys
  apiKey:       {{ .Values.global.apiKey       | b64enc | quote }}
  adminApiKey:  {{ .Values.global.adminApiKey  | b64enc | quote }}

  # MongoDB credentials
  mongoRootUser:     {{ .Values.mongodb.rootUser     | b64enc | quote }}
  mongoRootPassword: {{ .Values.mongodb.rootPassword | b64enc | quote }}

  # Hugging Face tokens (one per service so they can differ)
  whisperHfToken: {{ .Values.whisper.hfToken       | b64enc | quote }}
  sdHfToken:      {{ .Values.stableDiffusion.hfToken | b64enc | quote }}

  # CivitAI key for Stable Diffusion model downloads
  civitKey: {{ .Values.stableDiffusion.civitKey | b64enc | quote }}

  # Telegram Bot token
  telegramToken: {{ .Values.telegramBot.token | b64enc | quote }}

  # Nextcloud credentials
  nextcloudPassword: {{ .Values.nextcloudSync.nextcloudPassword | b64enc | quote }}

  # Keycloak client secret (empty string when Keycloak is not configured)
  keycloakClientSecret: {{ .Values.keycloak.clientSecret | b64enc | quote }}
