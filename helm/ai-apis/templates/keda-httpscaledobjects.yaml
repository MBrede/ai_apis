---
# ── KEDA HTTP add-on: scale Text Classification to zero when idle ─────────────
# No external ingress — bot calls via internal ingress host which also goes
# through the KEDA interceptor for scale-from-zero.
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: {{ .Release.Name }}-text-classification
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: text-classification
spec:
  hosts:
    - {{ .Values.textClassification.ingress.host | quote }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-text-classification
    service: {{ .Release.Name }}-text-classification-app
    port: {{ .Values.textClassification.port }}
  replicas:
    min: 0
    max: 1
  scaledownPeriod: {{ .Values.keda.idleTimeout }}
  targetPendingRequests: 1
{{- end }}
