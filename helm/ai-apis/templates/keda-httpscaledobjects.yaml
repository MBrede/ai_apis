{{- if .Values.keda.enabled }}
# ── KEDA HTTP add-on: scale Whisper to zero when idle ────────────────────────
# Traffic flow: nginx ingress → ExternalName service → KEDA interceptor (keda ns)
#               → buffers requests → scales whisper deployment → forwards request
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: {{ .Release.Name }}-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
spec:
  hosts:
    - {{ .Values.whisper.ingress.host | quote }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-whisper
    service: {{ .Release.Name }}-whisper-app
    port: {{ .Values.whisper.port }}
  replicas:
    min: 0
    max: 1
  # Seconds of no traffic before scaling to zero — frees the GPU time-slice
  scaledownPeriod: {{ .Values.keda.idleTimeout }}
  # Seconds to wait for the pod to become ready before failing a queued request
  scalingModifiers: {}
  targetPendingRequests: 1
---
# ── KEDA HTTP add-on: scale Stable Diffusion to zero when idle ───────────────
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: {{ .Release.Name }}-stable-diffusion
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: stable-diffusion
spec:
  hosts:
    - {{ .Values.stableDiffusion.ingress.host | quote }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-stable-diffusion
    service: {{ .Release.Name }}-stable-diffusion-app
    port: {{ .Values.stableDiffusion.port }}
  replicas:
    min: 0
    max: 1
  # Seconds of no traffic before scaling to zero — frees the GPU time-slice
  scaledownPeriod: {{ .Values.keda.idleTimeout }}
  targetPendingRequests: 1
{{- end }}
