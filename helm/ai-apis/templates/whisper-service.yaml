{{- if .Values.keda.enabled }}
# ── KEDA mode: app service (ClusterIP to pods, internal name) ────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-whisper-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
  annotations:
    helm.sh/chart: {{ include "ai-apis.chart" . }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.whisper.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ai-apis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
---
# ── KEDA mode: interceptor service (ExternalName → KEDA interceptor proxy) ───
# Ingress still points to {{ .Release.Name }}-whisper; this service redirects
# that traffic through the KEDA HTTP add-on interceptor which queues requests
# and triggers scale-from-zero.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
  annotations:
    helm.sh/chart: {{ include "ai-apis.chart" . }}
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
    - name: http
      port: 8080
      protocol: TCP
{{- else }}
# ── Normal mode: direct ClusterIP service ────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
  annotations:
    helm.sh/chart: {{ include "ai-apis.chart" . }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.whisper.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ai-apis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
{{- end }}
