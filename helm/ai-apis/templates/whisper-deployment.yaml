apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-apis.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
  annotations:
    helm.sh/chart: {{ include "ai-apis.chart" . }}
spec:
  # Only one replica is supported because the GPU PVC is ReadWriteOnce.
  # When keda.enabled, replicas are managed by the HTTPScaledObject (can be 0).
  {{- if not .Values.keda.enabled }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-apis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: whisper
  template:
    metadata:
      labels:
        {{- include "ai-apis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: whisper
    spec:
      nodeSelector:
        {{- include "ai-apis.gpuNodeSelector" . | nindent 8 }}
      containers:
        - name: whisper
          image: {{ include "ai-apis.image" (dict "root" . "imageName" .Values.whisper.image) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.whisper.port }}
              protocol: TCP
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-apis-secrets
                  key: apiKey
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-apis-secrets
                  key: whisperHfToken
            - name: DEFAULT_WHISPER_MODEL
              value: {{ .Values.whisper.defaultModel | quote }}
            - name: WHISPER_PORT
              value: {{ .Values.whisper.port | quote }}
            - name: USE_MONGODB
              value: {{ .Values.global.useMongodb | quote }}
            - name: MONGODB_DB
              value: {{ .Values.mongodb.database | quote }}
            # MONGO_USER and MONGO_PASSWORD are injected first so that
            # MONGODB_URL can reference them via shell-style $(VAR) substitution
            # when the URL is auto-constructed by the helper template.
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: ai-apis-secrets
                  key: mongoRootUser
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-apis-secrets
                  key: mongoRootPassword
            - name: MONGODB_URL
              value: {{ include "ai-apis.mongodbUrl" . | quote }}
            {{- include "ai-apis.keycloakEnv" . | nindent 12 }}
          volumeMounts:
            - name: whisper-cache
              mountPath: /root/.cache
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: whisper-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-whisper-cache
